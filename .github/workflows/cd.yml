name: CD

on:
  push:
    tags:
      - "v*"
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-prefix: ${{ steps.meta.outputs.image_prefix }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate image tag
        id: meta
        run: |
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          IMAGE_PREFIX="ghcr.io/$OWNER_LOWER/muninsbok"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "image_prefix=$IMAGE_PREFIX" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      # ── API image ──
      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}-api:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image_prefix }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Web image ──
      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}-web:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image_prefix }}-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10
    environment: production

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            docker-compose.yml
            scripts/deploy.sh

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            cd ${{ secrets.DEPLOY_PATH || '~/muninsbok' }}

            # Pull latest images
            echo "Pulling images with tag ${{ needs.build-and-push.outputs.image-tag }}..."
            docker pull ${{ needs.build-and-push.outputs.image-prefix }}-api:${{ needs.build-and-push.outputs.image-tag }}
            docker pull ${{ needs.build-and-push.outputs.image-prefix }}-web:${{ needs.build-and-push.outputs.image-tag }}

            # Tag as "current" for docker-compose
            docker tag ${{ needs.build-and-push.outputs.image-prefix }}-api:${{ needs.build-and-push.outputs.image-tag }} ${{ needs.build-and-push.outputs.image-prefix }}-api:current
            docker tag ${{ needs.build-and-push.outputs.image-prefix }}-web:${{ needs.build-and-push.outputs.image-tag }} ${{ needs.build-and-push.outputs.image-prefix }}-web:current

            # Rolling restart (API first, then web)
            docker compose up -d --no-build api
            echo "Waiting for API health check..."
            timeout 60 bash -c 'until docker compose exec -T api wget -qO- http://localhost:3000/health; do sleep 2; done'

            docker compose up -d --no-build web
            echo "Deploy complete: ${{ needs.build-and-push.outputs.image-tag }}"

            # Clean up old images
            docker image prune -f --filter "until=168h"
