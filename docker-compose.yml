services:
  postgres:
    image: postgres:16-alpine
    container_name: muninsbok-db
    env_file: .env.docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=${POSTGRES_ARCHIVE_MODE:-on}
      - -c
      - archive_timeout=${POSTGRES_ARCHIVE_TIMEOUT_SECONDS:-300}s
      - -c
      - archive_command=test ! -f /var/lib/postgresql/wal-archive/%f && cp %p /var/lib/postgresql/wal-archive/%f
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - wal_archive_data:/var/lib/postgresql/wal-archive
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: muninsbok-api
    ports:
      - "3000:3000"
    env_file: .env.docker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DB_MIGRATION_MODE: ${DB_MIGRATION_MODE:-fallback}
      OCR_ENABLE_PDF: ${OCR_ENABLE_PDF:-false}
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: muninsbok-web
    ports:
      - "5173:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backup:
    build:
      context: ./scripts/backup
      dockerfile: Dockerfile
    container_name: muninsbok-backup
    profiles:
      - backup
    env_file: .env.docker
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BACKUP_INTERVAL_MINUTES: ${BACKUP_INTERVAL_MINUTES:-60}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-35}
      BACKUP_INCLUDE_UPLOADS: ${BACKUP_INCLUDE_UPLOADS:-true}
      BACKUP_INCLUDE_WAL_ARCHIVE: ${BACKUP_INCLUDE_WAL_ARCHIVE:-true}
      BACKUP_S3_URI: ${BACKUP_S3_URI:-}
      BACKUP_S3_UPLOADS_PREFIX: ${BACKUP_S3_UPLOADS_PREFIX:-uploads}
      BACKUP_S3_WAL_PREFIX: ${BACKUP_S3_WAL_PREFIX:-wal-archive}
    volumes:
      - backup_data:/backups
      - uploads_data:/uploads:ro
      - wal_archive_data:/wal-archive:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
  uploads_data:
  backup_data:
  wal_archive_data:
